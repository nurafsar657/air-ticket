<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Ticket Booking</title>
</head>
<body>

    <h1>Air Ticket Booking</h1>

    <form>

        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="from">From:</label><br>
        <input type="text" id="from" name="from" required><br><br>

        <label for="to">To:</label><br>
        <input type="text" id="to" name="to" required><br><br>

        <label for="departure">Departure Date:</label><br>
        <input type="date" id="departure" name="departure" required><br><br>

        <label for="return">Return Date:</label><br>
        <input type="date" id="return" name="return"><br><br>

        <label for="passengers">Number of Passengers:</label><br>
        <input type="number" id="passengers" name="passengers" min="1" max="10" required><br><br>

        <label>Class:</label><br>

        <input type="radio" id="economy" name="class" value="Economy" checked>
        <label for="economy">Economy</label><br>

        <input type="radio" id="business" name="class" value="Business">
        <label for="business">Business</label><br>

        <input type="radio" id="first" name="class" value="First Class">
        <label for="first">First Class</label><br><br>

        <label>Additional Services:</label><br>

        <input type="checkbox" id="meal" name="service" value="Meal">
        <label for="meal">Meal</label><br>

        <input type="checkbox" id="luggage" name="service" value="Extra Luggage">
        <label for="luggage">Extra Luggage</label><br>

        <input type="checkbox" id="insurance" name="service" value="Travel Insurance">
        <label for="insurance">Travel Insurance</label><br><br>

        <label for="message">Special Request:</label><br>
        <textarea id="message" name="message" rows="4" cols="40"></textarea><br><br>

        <button type="submit">Book Now</button>
        <button type="reset">Reset</button>

    </form>

</body>
</html>
